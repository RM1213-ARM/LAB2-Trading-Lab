# Virtual host configuration — serves static frontend files and reverse proxies /api/* requests to Flask API at 192.168.35.20:5000

server {
	listen 80 default_server;
	listen [::]:80 default_server;

	root /var/www/html;

	# Add index.php to the list if you are using PHP
	index index.html index.htm index.nginx-debian.html;

	server_name _;

	location /api/ {
		proxy_pass http://192.168.35.20:5000/;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
	}

}
